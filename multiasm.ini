[Multiline Ultimate Assembler]
; =========================================================================
; Multiline Ultimate Assembler - x64dbg & OllyDbg Syntax Highlighting
; =========================================================================
; 이 INI 파일은 어셈블러 에디터의 구문 강조(Syntax Highlighting) 색상을 설정합니다.
;
; [16진수 RGB 색상 값 설정 가이드]
; - 직관적인 순방향 16진수 RGB 형식(0xRRGGBB)으로 작성해야 합니다.
; - 예시:
;   * 빨간색 (Red)   : RGB(255, 0, 0)     => 0xFF0000 (Red=FF, Green=00, Blue=00)
;   * 초록색 (Green) : RGB(0, 255, 0)     => 0x00FF00 (Red=00, Green=FF, Blue=00)
;   * 파란색 (Blue)  : RGB(0, 0, 255)     => 0x0000FF (Red=00, Green=00, Blue=FF)
;   * 노란색 (Yellow): RGB(255, 255, 0)   => 0xFFFF00 (Red=FF, Green=FF, Blue=00)
;   * 흰색 (White)   : RGB(255, 255, 255) => 0xFFFFFF
;   * 검은색 (Black) : RGB(0, 0, 0)       => 0x000000
; - 텍스트를 굵게 표시하고 싶은 경우, 최상위 바이트에 01을 입력합니다 (예: 0x01RRGGBB).
; =========================================================================
; -------------------------------------------------------------------------
; x64dbg 스크린샷 색상 계열 유지 + 밝은(아이보리) 배경 라이트 테마
;
; [색상 선택 원칙]
;   스크린샷의 색상 계열(Hue)을 그대로 가져오되,
;   밝은 배경에서 가독성을 위해 채도/명도를 낮춰 어두운 톤으로 조정:
;     - call (시안 계열)   : 밝은 #00FFFF → 어두운 #007799
;     - jmp  (노랑 계열)   : 밝은 #FFFF00 → 어두운 #886600
;     - 숫자 (시안 계열)   : 밝은 #00FFFF → 어두운 #007799
;     - 니모닉 (연두 계열) : 밝은 #80C000 → 어두운 #446600
;     - 레지스터 (오렌지)  : 그대로     → #CC6000
;     - 세그먼트 레지스터  : 밝은 마젠타 → 어두운 #880088
;   call/jmp 키워드 배경 하이라이트는 스크린샷 그대로 형광 시안/노랑 유지
; -------------------------------------------------------------------------

; --- JMP (점프) ---
color_jmp          = 0xFF0000   ; jmp/je/js 키워드 글자색 - 어두운 황금색 RGB(136, 102, 0)
color_jmp_bg       = 0x00FFFF00   ; jmp 키워드 배경 - 형광 노란색 하이라이트 RGB(255, 255, 0)

; --- CALL (함수 호출) ---
color_call         = 0x00004D66   ; call 키워드 글자색 - 어두운 진청록색 RGB(0, 77, 102)
color_call_bg      = 0x0000FFFF   ; call 키워드 배경 - 형광 시안 하이라이트 RGB(0, 255, 255)

; --- RET (함수 반환) ---
color_ret          = 0x0   ; ret 키워드 글자색 - 어두운 진청록색 RGB(0, 77, 102)
color_ret_bg       = 0x79F979   ; ret 키워드 배경 - 형광 시안 하이라이트 RGB(0, 255, 255)

; --- NOP / INT3 ---
color_nop          = 0x00808080   ; int3 / NOP 글자색 - 중간 회색 RGB(128, 128, 128)
color_nop_bg       = 0x00FFFBF0   ; NOP 배경색 - 기본 에디터 배경(아이보리)

; --- 세그먼트 레지스터 (ss, ds, cs, es) ---
color_reg_special  = 0x800000   ; 세그먼트 레지스터 글자색 - 어두운 마젠타 RGB(136, 0, 136)
color_reg_special_bg = 0x00FFFBF0 ; 세그먼트 레지스터 배경색 - 기본 에디터 배경

; --- FPU ---
color_fpu          = 0x00884400   ; FPU 명령어 글자색 - 어두운 갈색-주황 RGB(136, 68, 0)
color_fpu_bg       = 0x00FFFBF0   ; FPU 배경색 - 기본 에디터 배경

; --- SSE / AVX 확장 명령어 ---
color_ext          = 0x00880000   ; 확장 명령어 글자색 - 어두운 빨강 RGB(136, 0, 0)
color_ext_bg       = 0x00FFFBF0   ; 확장 명령어 배경색 - 기본 에디터 배경

; --- 데이터 타입 키워드 (dword, word, byte) ---
color_type         = 0x00004499   ; 데이터 타입 키워드 글자색 - 어두운 파랑 RGB(0, 68, 153)
color_type_bg      = 0x00FFFBF0   ; 데이터 타입 배경색 - 기본 에디터 배경

; --- 보조 키워드 (ptr, near, far, short) ---
color_other        = 0x00886622   ; 보조 키워드 글자색 - 어두운 황갈색 RGB(136, 102, 34)
color_other_bg     = 0x00FFFBF0   ; 보조 키워드 배경색 - 기본 에디터 배경

; --- 일반 GP 레지스터 배경 ---
color_reg_bg       = 0x00FFFBF0   ; 일반 GP 레지스터 배경색 - 기본 에디터 배경

; -------------------------------------------------------------------------
; [에디터 창 위치 및 크기 유지 설정]
; -------------------------------------------------------------------------
pos_x              =1061
pos_y              =71
pos_w              =900
pos_h              =1035
tabs_path          = .\multiasm
disasm_rva         =1
disasm_rva_reloconly =1
disasm_label       =1
disasm_extjmp      =1
disasm_hex         =0
disasm_labelgen    =0
asm_comments       =1
asm_labels         =1
edit_savepos       =1
edit_tabwidth      =1
font_name          =D2Coding
font_size          =12
font_bold          =0
font_italic        =0
font_charset       =0
bg_use_custom      =1
bg_color           =0x00FFFBF0
color_cmd          =255
color_cmd_bg       =0x00FFFBF0
color_reg          =0x00800000
color_cmnt         =0x003A0000
color_num          =32768
color_jmp_line_bg  =0x00FFFFD0
color_call_line_bg =0x00E0FFFF
